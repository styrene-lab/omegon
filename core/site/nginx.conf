server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    
    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # install.sh — served as plain text, short cache
    location = /install.sh {
        default_type text/plain;
        add_header Cache-Control "public, max-age=300";
        add_header X-Content-Type-Options "nosniff" always;
    }
    
    # Landing page — short cache
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "public, max-age=600";
    }
    
    # Docs — handle both /docs and /docs/ and all sub-paths
    # Astro outputs /docs/index.html, /docs/install/index.html, etc.
    # We need /docs → /docs/, /docs/install → /docs/install/
    location /docs {
        # If it's a directory request without trailing slash, redirect
        # try_files handles: exact file, directory with index.html, 404
        try_files $uri $uri/index.html $uri/ =404;
        add_header Cache-Control "public, max-age=600";
    }
    
    # Changelog — same pattern
    location /changelog {
        try_files $uri $uri/index.html $uri/ =404;
        add_header Cache-Control "public, max-age=600";
    }
    
    # Sitemap
    location ~* sitemap.*\.xml$ {
        add_header Cache-Control "public, max-age=3600";
    }
    
    # Static assets — long cache (SVG, CSS, JS, fonts, images)
    location ~* \.(css|js|png|svg|ico|woff2)$ {
        add_header Cache-Control "public, max-age=86400, immutable";
    }
    
    # Health check for k8s probes
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        default_type text/plain;
    }
    
    # Everything else — 404
    location / {
        return 404;
    }
}
