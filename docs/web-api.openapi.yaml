openapi: 3.1.0
info:
  title: Omegon Web API
  version: 0.27.0
  description: >
    Browser-native control surface for the Omegon web dashboard ("omegon-web").
    Covers the browser-native Web UI API: `/api/web/*` compatibility routes,
    native first-party `/api/sessions*` session resources, daemon event ingress,
    capability discovery, launch context, semantic surface snapshots/streams,
    semantic action ingress, saved-session listing, and staged browser attachments.


    Derived from the axum handlers in `core/crates/omegon/src/web/` (api.rs,
    surfaces.rs, surface_stream.rs) and the UI-runtime outcome envelope in
    `core/crates/omegon/src/ui_runtime/envelope.rs`. This document is the
    source of truth for the wire shape — code implements the contract.
servers:
  - url: /
    description: Same-origin as the served dashboard (default 127.0.0.1 bind).

tags:
  - name: discovery
    description: Capability and launch-context discovery.
  - name: surfaces
    description: Semantic surface snapshot and live stream.
  - name: actions
    description: Browser-native semantic action ingress.
  - name: sessions
    description: Saved/live session listing.
  - name: events
    description: Authenticated daemon/runtime event ingress.
  - name: attachments
    description: Staged browser attachments.

paths:
  /api/sessions:
    post:
      tags: [sessions]
      operationId: postNativeSession
      summary: Create or attach the native first-party live session.
      description: >
        Phase 1 exposes the singleton in-process agent session through the
        native session resource shape. Requires the `native_session.create`
        RBAC operation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NativeSessionCreateRequest"
      responses:
        "201":
          description: Native live session created or attached.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NativeSessionCreateResponse"
        "400":
          description: Requested cwd does not match the server working directory.
        "403":
          description: Caller role lacks `native_session.create`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RbacErrorResponse"
        "404":
          description: Requested assistant_profile_id is unknown.

  /api/sessions/{session_id}:
    get:
      tags: [sessions]
      operationId: getNativeSession
      summary: Native session metadata plus current surface snapshot.
      description: Requires the `native_session.read` RBAC operation.
      parameters:
        - name: session_id
          in: path
          required: true
          description: Session id. Only `default` is currently accepted.
          schema:
            type: string
      responses:
        "200":
          description: Session metadata and a current surface snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebSessionShowResponse"
        "403":
          description: Caller role lacks `native_session.read`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RbacErrorResponse"
        "404":
          description: Unknown session_id.

  /api/sessions/{session_id}/surfaces:
    get:
      tags: [surfaces]
      operationId: getNativeSessionSurfaces
      summary: Native session semantic surface snapshot.
      description: Requires the `surface.read` RBAC operation.
      parameters:
        - name: session_id
          in: path
          required: true
          description: Session id. Only `default` is currently accepted.
          schema:
            type: string
      responses:
        "200":
          description: Surface snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebSurfacesSnapshot"
        "403":
          description: Caller role lacks `surface.read`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RbacErrorResponse"
        "404":
          description: Unknown session_id.

  /api/sessions/{session_id}/surfaces/stream:
    get:
      tags: [surfaces]
      operationId: streamNativeSessionSurfaces
      summary: Native session live surface stream (WebSocket upgrade).
      description: >
        Requires a valid web-auth query token and the `surface.stream` RBAC
        operation before the WebSocket upgrade is accepted.
      parameters:
        - name: session_id
          in: path
          required: true
          description: Session id. Only `default` is currently accepted.
          schema:
            type: string
        - name: token
          in: query
          required: false
          description: Web-auth query token.
          schema:
            type: string
      responses:
        "101":
          description: Switching Protocols — WebSocket established.
        "401":
          description: Missing or invalid web-auth token.
        "403":
          description: Caller role lacks `surface.stream`.
        "404":
          description: Unknown session_id.
      x-websocket-message:
        $ref: "#/components/schemas/SurfaceStreamMessage"

  /api/web/capabilities:
    get:
      tags: [discovery]
      operationId: getWebCapabilities
      summary: Web/Auspex capability descriptor.
      description: Static descriptor of what the hosted web UI supports.
      responses:
        "200":
          description: Capability descriptor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebCapabilityDescriptor"

  /api/web/launch-context:
    get:
      tags: [discovery]
      operationId: getWebLaunchContext
      summary: Describe how the web UI was launched.
      description: >
        Reports whether the UI is being served directly or proxied (e.g. by
        Auspex). Derived from request headers.
      parameters:
        - name: Omegon-Principal-Issuer
          in: header
          required: false
          description: >
            Set by a proxy (e.g. Auspex). Presence flips `mode` to `proxied`
            and `policy_owner` to `auspex`.
          schema:
            type: string
        - name: Omegon-Back-Url
          in: header
          required: false
          description: >
            Return URL for the proxying surface. Only honored when it begins
            with `http://` or `https://`.
          schema:
            type: string
            format: uri
      responses:
        "200":
          description: Launch context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebLaunchContextResponse"

  /api/web/surfaces:
    get:
      tags: [surfaces]
      operationId: getWebSurfaces
      summary: Browser-native semantic surface snapshot.
      description: >
        Full point-in-time projection of every renderer-neutral surface for the
        live session.
      responses:
        "403":
          description: Caller role lacks `surface.read`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RbacErrorResponse"

  /api/web/surfaces/stream:
    get:
      tags: [surfaces]
      operationId: streamWebSurfaces
      summary: Live surface stream (WebSocket upgrade).
      description: >
        Upgrades the GET request to a WebSocket. On connect the server sends a
        `snapshot` message carrying the full `WebSurfacesSnapshot` as `payload`,
        then one message per agent event with a monotonically increasing
        `revision`. On consumer lag the server emits an `error` message advising
        a refetch of `/api/web/surfaces`. Messages are JSON text frames.
      parameters:
        - name: token
          in: query
          required: false
          description: >
            Web-auth query token. Required when the server has web auth enabled;
            an invalid or missing token yields `401` before the upgrade.
          schema:
            type: string
      responses:
        "101":
          description: Switching Protocols — WebSocket established.
        "401":
          description: Missing or invalid web-auth token.
        "403":
          description: Caller role lacks `surface.stream`.
      x-websocket-message:
        $ref: "#/components/schemas/SurfaceStreamMessage"

  /api/web/actions:
    post:
      tags: [actions]
      operationId: postWebAction
      summary: Browser-native semantic action ingress.
      description: >
        Submit a renderer-neutral action against the live session. The response
        is always a `UiActionOutcomeEnvelope`; the HTTP status reflects the
        disposition. Only `schema_version: 1` and `session_id: "default"` are
        currently accepted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebActionRequest"
      responses:
        "202":
          description: Action accepted and queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiActionOutcomeEnvelope"
        "400":
          description: >
            Rejected — unsupported schema_version, a prompt with neither text
            nor attachments, a non-slash "slash" command, or an unknown,
            expired, or malformed attachment id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiActionOutcomeEnvelope"
        "404":
          description: >
            Unknown session_id, or (for respond_permission /
            respond_operator_wait) an unknown or already-answered request_id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiActionOutcomeEnvelope"
        "403":
          description: Caller role lacks `native_session.action`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiActionOutcomeEnvelope"
        "501":
          description: >
            Action recognized but not yet wired (copy_latest_response,
            select_segment, copy_segment).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiActionOutcomeEnvelope"
        "503":
          description: Command queue unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UiActionOutcomeEnvelope"

  /api/web/sessions:
    get:
      tags: [sessions]
      operationId: getWebSessions
      summary: Browser-native saved session list.
      description: >
        Lists saved sessions for the current working directory, with the live
        `default` session pinned first.
      responses:
        "200":
          description: Session list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebSessionListResponse"

  /api/web/sessions/{session_id}:
    get:
      tags: [sessions]
      operationId: getWebSession
      summary: Session metadata plus current surface snapshot.
      parameters:
        - name: session_id
          in: path
          required: true
          description: Session id, or `default` for the live session.
          schema:
            type: string
      responses:
        "200":
          description: Session metadata and a current surface snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebSessionShowResponse"
        "404":
          description: Unknown session_id.

  /api/web/attachments:
    post:
      tags: [attachments]
      operationId: postWebAttachment
      summary: Stage a browser-provided attachment.
      description: >
        Stores a base64-encoded payload under a generated id. Decoded payloads
        larger than 16 MiB are rejected. Staged attachments expire 24h after
        creation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebAttachmentCreateRequest"
      responses:
        "201":
          description: Attachment staged.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebAttachmentResponse"
        "400":
          description: Invalid filename or non-base64 payload.
        "413":
          description: Decoded payload exceeds 16 MiB.

  /api/web/attachments/{id}:
    get:
      tags: [attachments]
      operationId: getWebAttachment
      summary: Retrieve a staged browser attachment.
      parameters:
        - name: id
          in: path
          required: true
          description: Attachment id. Must not contain path separators or null bytes.
          schema:
            type: string
      responses:
        "200":
          description: Attachment metadata plus base64-encoded bytes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebAttachmentGetResponse"
        "400":
          description: Malformed id.
        "404":
          description: Attachment not found or expired.

  /api/events:
    get:
      tags: [events]
      operationId: getDaemonEvents
      summary: List queued daemon/runtime events.
      responses:
        "200":
          description: Queued daemon event snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DaemonEventsResponse"
    post:
      tags: [events]
      operationId: postDaemonEvent
      summary: Authenticated local event ingress for daemon/runtime triggers.
      description: >
        Requires a bearer web-auth token and an explicit `caller_role`. The
        caller role must satisfy the `event.ingress` RBAC operation and the
        trigger-specific control role classification.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DaemonEventEnvelope"
      responses:
        "202":
          description: Event accepted and queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventAccepted"
        "400":
          description: Missing or unknown caller_role.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RbacErrorResponse"
        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RbacErrorResponse"
        "403":
          description: Caller role lacks `event.ingress` or trigger-specific authority.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RbacErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    NativeSessionCreateRequest:
      type: object
      properties:
        assistant_profile_id:
          type: [string, "null"]
        cwd:
          type: [string, "null"]

    NativeSessionCreateResponse:
      type: object
      required: [schema_version, session, allocation_mode, assistant_profile_id, assistant, links]
      properties:
        schema_version:
          type: integer
          const: 1
        session:
          $ref: "#/components/schemas/WebSessionSummary"
        allocation_mode:
          type: string
          enum: [singleton_live]
        assistant_profile_id:
          type: [string, "null"]
        assistant:
          type: [object, "null"]
          additionalProperties: true
        links:
          $ref: "#/components/schemas/WebSessionLinks"

    WebSessionLinks:
      type: object
      required: [surfaces, actions, stream]
      properties:
        surfaces:
          type: [string, "null"]
        actions:
          type: [string, "null"]
        stream:
          type: [string, "null"]

    RbacErrorResponse:
      type: object
      required: [schema_version, error, reason, operation, capability, required_base, role, mode]
      properties:
        schema_version:
          type: integer
          const: 1
        error:
          type: string
          enum: [unauthorized, invalid_role, forbidden, misconfigured, policy_unavailable]
        reason:
          type: string
        operation:
          type: [string, "null"]
        capability:
          type: [string, "null"]
        required_base:
          type: [string, "null"]
        role:
          type: [string, "null"]
        mode:
          type: string

    EventAccepted:
      type: object
      required: [accepted, queued_events]
      properties:
        accepted:
          type: boolean
        queued_events:
          type: integer
          minimum: 0

    DaemonEventsResponse:
      type: object
      required: [schema_version, queued_events, processed_events, events]
      properties:
        schema_version:
          type: integer
          const: 1
        queued_events:
          type: integer
          minimum: 0
        processed_events:
          type: integer
          minimum: 0
        events:
          type: array
          items:
            $ref: "#/components/schemas/DaemonEventEnvelope"

    DaemonEventEnvelope:
      type: object
      required: [event_id, source, trigger_kind, payload, caller_role]
      properties:
        event_id: { type: string }
        source: { type: string }
        trigger_kind: { type: string }
        payload: true
        caller_role:
          type: string
          enum: [read, edit, admin, monitor, operator]
        source_user:
          type: [string, "null"]
        source_channel:
          type: [string, "null"]
        source_thread:
          type: [string, "null"]

    WebCapabilityDescriptor:
      type: object
      required:
        - interactive
        - chat
        - hosted_web_ui
        - surface_api
        - supports_tool_approval
        - supports_operator_wait
        - supports_session_resume
        - supports_attachments
        - supports_auspex_proxy
      properties:
        interactive: { type: boolean }
        chat: { type: boolean }
        hosted_web_ui: { type: boolean }
        surface_api: { type: boolean }
        supports_tool_approval: { type: boolean }
        supports_operator_wait: { type: boolean }
        supports_session_resume: { type: boolean }
        supports_attachments: { type: boolean }
        supports_auspex_proxy: { type: boolean }

    WebLaunchContextResponse:
      type: object
      required: [mode, policy_owner]
      properties:
        mode:
          type: string
          enum: [direct, proxied]
        proxied_by:
          type: [string, "null"]
          description: Identifier of the proxying surface, when proxied.
        back_url:
          type: [string, "null"]
          format: uri
          description: Return URL for the proxying surface, when provided.
        policy_owner:
          type: string
          enum: [omegon, auspex]

    WebSurfacesSnapshot:
      type: object
      required: [schema_version, session_id, revision, generated_at, surfaces]
      properties:
        schema_version:
          type: integer
          format: int32
          const: 1
        session_id: { type: string }
        revision:
          type: integer
          format: int64
          minimum: 0
        generated_at:
          type: string
          description: RFC 3339 timestamp.
        surfaces:
          $ref: "#/components/schemas/WebSurfaceBundle"

    WebSurfaceBundle:
      type: object
      description: >
        Renderer-neutral surfaces for one session. All surfaces are modeled in
        full from the DTOs in `core/crates/omegon/src/web/surfaces.rs`.
      required:
        - conversation
        - editor
        - command
        - command_menu
        - dashboard
        - footer
        - instruments
        - memory_status
        - operations
        - settings
      properties:
        conversation:
          $ref: "#/components/schemas/WebConversationSurface"
        editor:
          $ref: "#/components/schemas/WebEditorSurface"
        command:
          $ref: "#/components/schemas/WebCommandSurface"
        command_menu:
          $ref: "#/components/schemas/WebCommandMenuSurface"
        dashboard:
          $ref: "#/components/schemas/WebDashboardSurface"
        footer:
          $ref: "#/components/schemas/WebFooterSurface"
        instruments:
          $ref: "#/components/schemas/WebInstrumentsSurface"
        memory_status:
          $ref: "#/components/schemas/WebMemoryStatusSurface"
        operations:
          $ref: "#/components/schemas/WebOperationsSurface"
        settings:
          $ref: "#/components/schemas/WebSettingsSurface"

    WebEditorSurface:
      type: object
      required: [accepts_prompt, placeholder, queue_mode, supports_attachments]
      properties:
        accepts_prompt:
          type: boolean
          description: Whether the editor currently accepts a prompt submission.
        placeholder:
          type: string
        queue_mode:
          type: string
          description: >
            How prompts submitted while busy are handled (e.g. `until_ready`).
        supports_attachments:
          type: boolean

    WebCommandSurface:
      type: object
      properties:
        pending_prompt:
          type: [string, "null"]
          description: A prompt staged but not yet submitted, if any.

    WebCommandMenuSurface:
      type: object
      required: [available, open]
      properties:
        available:
          type: boolean
          description: Whether the slash-command menu can be opened.
        open:
          type: boolean
          description: Whether the menu is currently open.

    WebDashboardSurface:
      type: object
      required:
        - session
        - lifecycle_available
        - cleave_available
        - delegate_available
        - harness_available
      properties:
        session:
          $ref: "#/components/schemas/WebDashboardSessionSurface"
        lifecycle_available:
          type: boolean
        cleave_available:
          type: boolean
        delegate_available:
          type: boolean
        harness_available:
          type: boolean

    WebDashboardSessionSurface:
      type: object
      required: [turns, tool_calls, compactions]
      properties:
        turns:
          type: integer
          format: int32
          minimum: 0
        tool_calls:
          type: integer
          format: int32
          minimum: 0
        compactions:
          type: integer
          format: int32
          minimum: 0

    WebFooterSurface:
      type: object
      required: [busy]
      properties:
        busy:
          type: boolean
          description: Whether the agent is mid-turn.

    WebInstrumentsSurface:
      type: object
      properties:
        active_tool:
          type: [string, "null"]
          description: Name of the tool currently executing, if any.

    WebMemoryStatusSurface:
      type: object
      required: [active_facts, total_facts]
      properties:
        active_facts:
          type: integer
          minimum: 0
        total_facts:
          type: integer
          minimum: 0

    WebOperationsSurface:
      type: object
      required: [active_child_runtimes]
      properties:
        active_child_runtimes:
          type: integer
          minimum: 0
          description: Count of active delegate/child runtimes.

    WebSettingsSurface:
      type: object
      properties:
        auth_mode:
          type: [string, "null"]
        auth_source:
          type: [string, "null"]

    WebConversationSurface:
      type: object
      required: [segments]
      properties:
        segments:
          type: array
          items:
            $ref: "#/components/schemas/WebConversationSegment"

    WebConversationSegment:
      type: object
      required: [index, role, complete, copyable, selectable]
      properties:
        index:
          type: integer
          minimum: 0
        role: { type: string }
        title:
          type: [string, "null"]
        summary:
          type: [string, "null"]
        body:
          type: [string, "null"]
        complete: { type: boolean }
        copyable: { type: boolean }
        selectable: { type: boolean }

    SurfaceStreamMessage:
      type: object
      description: One JSON text frame on the /api/web/surfaces/stream WebSocket.
      required: [schema_version, session_id, revision, type, payload]
      properties:
        schema_version:
          type: integer
          format: int32
          const: 1
        session_id: { type: string }
        revision:
          type: integer
          format: int64
        type:
          type: string
          description: >
            `snapshot` for the initial full projection, `error` on consumer lag,
            otherwise an agent-event-derived message type.
        surface:
          type: [string, "null"]
          description: Surface key the message pertains to, when scoped.
        payload:
          description: >
            For `snapshot`, a WebSurfacesSnapshot. For `error`, `{ "message": ... }`.
            Otherwise an agent-event-shaped object.
          oneOf:
            - $ref: "#/components/schemas/WebSurfacesSnapshot"
            - type: object
              additionalProperties: true

    WebActionRequest:
      type: object
      required: [schema_version, action_id, client_id, action]
      properties:
        schema_version:
          type: integer
          format: int32
          const: 1
        action_id:
          type: string
          description: Client-generated id echoed back in the outcome envelope.
        client_id: { type: string }
        session_id:
          type: string
          default: default
          description: Target session. Only `default` is currently accepted.
        action:
          $ref: "#/components/schemas/WebActionPayload"

    WebActionPayload:
      type: object
      description: >
        Discriminated by `type` (snake_case). Variant-specific fields are
        siblings of `type`.
      required: [type]
      properties:
        type:
          type: string
          enum:
            - submit_prompt
            - cancel_active_turn
            - run_slash_command
            - respond_permission
            - respond_operator_wait
            - copy_latest_response
            - select_segment
            - copy_segment
        text:
          type: string
          description: "submit_prompt: prompt text (must be non-empty)."
        attachments:
          type: array
          description: "submit_prompt: attachment ids (conversion not yet implemented)."
          items: { type: string }
        raw:
          type: string
          description: "run_slash_command: raw command, must start with `/`."
        request_id:
          type: string
          description: "respond_permission / respond_operator_wait: target request id."
        allow:
          type: boolean
          description: "respond_permission: approve or deny."
        completed:
          type: boolean
          description: "respond_operator_wait: whether the operator step completed."
        index:
          type: integer
          minimum: 0
          description: "select_segment / copy_segment: segment index."
      discriminator:
        propertyName: type

    UiActionOutcomeEnvelope:
      type: object
      required: [protocol_version, session_id, action_id, status]
      properties:
        protocol_version:
          type: integer
          format: int32
          const: 1
        session_id: { type: string }
        action_id: { type: string }
        status:
          type: string
          enum: [accepted, rejected, noop, deferred]
        revision_after:
          type: [integer, "null"]
          format: int64
        message:
          type: [string, "null"]
        error:
          type: [string, "null"]

    WebSessionListResponse:
      type: object
      required: [sessions]
      properties:
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/WebSessionSummary"

    WebSessionSummary:
      type: object
      required:
        - session_id
        - cwd
        - created_at
        - turns
        - tool_calls
        - last_prompt_snippet
        - current
      properties:
        session_id: { type: string }
        cwd: { type: string }
        created_at:
          type: string
          description: RFC 3339 timestamp.
        turns:
          type: integer
          format: int32
          minimum: 0
        tool_calls:
          type: integer
          format: int32
          minimum: 0
        last_prompt_snippet: { type: string }
        current:
          type: boolean
          description: True for the live session.

    WebSessionShowResponse:
      type: object
      required: [session, snapshot]
      properties:
        session:
          $ref: "#/components/schemas/WebSessionSummary"
        snapshot:
          $ref: "#/components/schemas/WebSurfacesSnapshot"

    WebAttachmentCreateRequest:
      type: object
      required: [filename, data_base64]
      properties:
        filename:
          type: string
          description: >
            Basename only; rejected if it contains path separators, null bytes,
            or `..`.
        content_type:
          type: [string, "null"]
        data_base64:
          type: string
          description: Standard base64-encoded payload (decoded max 16 MiB).

    WebAttachmentResponse:
      type: object
      required: [id, filename, size_bytes, expires_at]
      properties:
        id: { type: string }
        filename: { type: string }
        content_type:
          type: [string, "null"]
        size_bytes:
          type: integer
          minimum: 0
        expires_at:
          type: string
          description: RFC 3339 timestamp, 24h after creation.

    WebAttachmentGetResponse:
      type: object
      required: [attachment, data_base64]
      properties:
        attachment:
          $ref: "#/components/schemas/WebAttachmentResponse"
        data_base64:
          type: string
          description: Standard base64-encoded payload bytes.
