name: Publish to npm

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache pi-mono node_modules
        uses: actions/cache@v4
        with:
          path: vendor/pi-mono/node_modules
          key: pi-mono-${{ hashFiles('vendor/pi-mono/package.json') }}
          restore-keys: pi-mono-

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Check if publish needed
        id: check
        run: |
          LOCAL_VER=$(node -p "require('./package.json').version")
          NPM_VER=$(npm view omegon version 2>/dev/null || echo "0.0.0")
          echo "version=$LOCAL_VER" >> $GITHUB_OUTPUT
          if [ "$LOCAL_VER" = "$NPM_VER" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version $LOCAL_VER already published — skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Publishing: $LOCAL_VER (npm has $NPM_VER)"
          fi

      - name: Tag release
        if: steps.check.outputs.skip == 'false'
        run: |
          TAG="v${{ steps.check.outputs.version }}"
          if ! git tag --list "$TAG" | grep -q "$TAG"; then
            git tag "$TAG"
            git push origin --tags
          fi

      - name: Install and build pi-mono
        if: steps.check.outputs.skip == 'false'
        run: |
          cd vendor/pi-mono
          rm -f package-lock.json
          npm install --ignore-scripts
          npm run build

      - name: Publish pi-mono fork packages
        if: steps.check.outputs.skip == 'false'
        run: bash scripts/publish-pi-mono.sh

      - name: Install Omegon dependencies
        if: steps.check.outputs.skip == 'false'
        run: npm install --ignore-scripts

      - name: Verify vendor dist is fresh
        if: steps.check.outputs.skip == 'false'
        run: node scripts/check-vendor-dist.mjs

      - name: Publish omegon
        if: steps.check.outputs.skip == 'false'
        run: npm publish --access public --provenance

      - name: Deprecate broken 0.9.1
        if: steps.check.outputs.skip == 'false'
        continue-on-error: true
        run: |
          npm deprecate 'omegon@0.9.1' 'Broken: ships stale vendor dist with unfixed OAuth bug. Upgrade to 0.9.2 or later.'

      - name: Verify package is installable
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION=${{ steps.check.outputs.version }}
          echo "Verifying omegon@${VERSION} is installable..."
          # npm CDN propagation for 41MB+ tarballs can take 5-10 minutes
          # from certain Cloudflare PoPs (including GitHub Actions' edge).
          # Use npm install to verify — it follows redirects and retries
          # internally, which is more reliable than HEAD requests to the CDN.
          for i in $(seq 1 24); do
            if npm install --dry-run "omegon@${VERSION}" 2>/dev/null; then
              echo "✓ Package installable (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/24: not yet available — waiting 15s..."
            sleep 15
          done
          echo "::warning::Package not installable after 6 minutes from this CDN edge. The tarball typically propagates within 10 minutes — check manually."
          # Don't fail hard — the tarball will appear, just slowly on this edge
          exit 0
