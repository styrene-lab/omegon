name: Release Rust binary

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always
  APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
  APPLE_SIGNING_CERT_B64: ${{ secrets.APPLE_SIGNING_CERT_B64 }}
  APPLE_SIGNING_CERT_PASSWORD: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
  APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8_B64 }}
  APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
  APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    if: ${{ !contains(github.ref_name, '-nightly.') || matrix.nightly != false }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz
            nightly: false
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
            nightly: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --manifest-path core/Cargo.toml --release --target ${{ matrix.target }} -p omegon
          else
            cd core && cargo build --release --target ${{ matrix.target }} -p omegon
          fi

      - name: Strip binary
        run: |
          BINARY="core/target/${{ matrix.target }}/release/omegon"
          if command -v llvm-strip >/dev/null 2>&1; then
            llvm-strip "$BINARY"
          elif command -v strip >/dev/null 2>&1; then
            strip "$BINARY" 2>/dev/null || true
          fi

      - name: Import Apple signing certificate
        if: runner.os == 'macOS' && env.APPLE_SIGNING_CERT_B64 != '' && env.APPLE_SIGNING_CERT_PASSWORD != '' && env.APPLE_CODESIGN_IDENTITY != ''
        env:
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/omegon-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/omegon-signing.p12"
          echo "$APPLE_SIGNING_CERT_B64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_SIGNING_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Sign macOS binary
        if: runner.os == 'macOS' && env.APPLE_SIGNING_CERT_B64 != '' && env.APPLE_SIGNING_CERT_PASSWORD != '' && env.APPLE_CODESIGN_IDENTITY != ''
        run: |
          set -euo pipefail
          BINARY="core/target/${{ matrix.target }}/release/omegon"
          codesign --force --options runtime --timestamp --sign "$APPLE_CODESIGN_IDENTITY" "$BINARY"
          codesign --verify --deep --strict --verbose=2 "$BINARY"

      - name: Notarize macOS binary
        if: runner.os == 'macOS' && env.APPLE_SIGNING_CERT_B64 != '' && env.APPLE_SIGNING_CERT_PASSWORD != '' && env.APPLE_CODESIGN_IDENTITY != '' && env.APPLE_API_KEY_P8_B64 != '' && env.APPLE_API_KEY_ID != '' && env.APPLE_API_ISSUER != ''
        run: |
          set -euo pipefail
          BINARY="core/target/${{ matrix.target }}/release/omegon"
          NOTARY_ZIP="$RUNNER_TEMP/omegon-${{ matrix.target }}-notary.zip"
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_API_KEY_P8_B64" | base64 --decode > "$KEY_PATH"
          ditto -c -k --keepParent "$BINARY" "$NOTARY_ZIP"
          xcrun notarytool submit "$NOTARY_ZIP" \
            --key "$KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait

      - name: Create archive
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ARCHIVE="omegon-${VERSION}-${{ matrix.target }}.${{ matrix.archive }}"
          BINARY="core/target/${{ matrix.target }}/release/omegon"
          tar czf "$ARCHIVE" -C "$(dirname $BINARY)" omegon
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Generate SHA256 checksum
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Aggregate checksums
        run: |
          cd artifacts
          cat *.sha256 > checksums.sha256
          cat checksums.sha256

      # ─── SBOM ─────────────────────────────────────────────────
      - name: Install Rust toolchain (for cargo-cyclonedx)
        if: ${{ !contains(github.ref_name, '-nightly.') }}
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-cyclonedx
        if: ${{ !contains(github.ref_name, '-nightly.') }}
        run: cargo install cargo-cyclonedx

      - name: Generate CycloneDX SBOM
        if: ${{ !contains(github.ref_name, '-nightly.') }}
        run: |
          cd core
          cargo cyclonedx --manifest-path Cargo.toml --format json || true
          # Output file varies by cargo-cyclonedx version
          BOM=$(find . -maxdepth 1 -name '*.cdx.json' -o -name 'bom.json' | head -1)
          if [ -n "$BOM" ]; then
            cp "$BOM" ../artifacts/omegon-sbom.cdx.json
          else
            echo '{"bomFormat":"CycloneDX","specVersion":"1.4","components":[]}' > ../artifacts/omegon-sbom.cdx.json
          fi

      # ─── Signing (Sigstore cosign keyless) ─────────────────────
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release artifacts
        run: |
          cd artifacts
          for archive in omegon-*.tar.gz; do
            echo "Signing $archive..."
            cosign sign-blob --yes "$archive" \
              --output-signature "${archive}.sig" \
              --output-certificate "${archive}.pem"
          done

      - name: Sign SBOM
        if: ${{ !contains(github.ref_name, '-nightly.') }}
        run: |
          cd artifacts
          cosign sign-blob --yes omegon-sbom.cdx.json \
            --output-signature omegon-sbom.cdx.json.sig \
            --output-certificate omegon-sbom.cdx.json.pem

      # ─── Provenance attestation ────────────────────────────────
      - name: Attest build provenance
        if: ${{ !contains(github.ref_name, '-nightly.') }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: artifacts/omegon-*.tar.gz

      # ─── GitHub Release ────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc.') || contains(github.ref_name, '-nightly.') }}
          draft: ${{ contains(github.ref_name, '-nightly.') }}
          files: |
            artifacts/omegon-*.tar.gz
            artifacts/omegon-*.tar.gz.sha256
            artifacts/omegon-*.tar.gz.sig
            artifacts/omegon-*.tar.gz.pem
            artifacts/checksums.sha256
            artifacts/omegon-sbom.cdx.json
            artifacts/omegon-sbom.cdx.json.sig
            artifacts/omegon-sbom.cdx.json.pem
