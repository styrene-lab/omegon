name: Release Rust binary

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cd core && cross build --release --target ${{ matrix.target }} -p omegon
          else
            cd core && cargo build --release --target ${{ matrix.target }} -p omegon
          fi

      - name: Strip binary
        run: |
          BINARY="core/target/${{ matrix.target }}/release/omegon"
          if command -v llvm-strip >/dev/null 2>&1; then
            llvm-strip "$BINARY"
          elif command -v strip >/dev/null 2>&1; then
            strip "$BINARY" 2>/dev/null || true
          fi

      - name: Create archive
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ARCHIVE="omegon-${VERSION}-${{ matrix.target }}.${{ matrix.archive }}"
          BINARY="core/target/${{ matrix.target }}/release/omegon"
          tar czf "$ARCHIVE" -C "$(dirname $BINARY)" omegon
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Generate SHA256 checksum
        run: |
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Aggregate checksums
        run: |
          cd artifacts
          cat *.sha256 > checksums.sha256
          cat checksums.sha256

      # ─── SBOM ─────────────────────────────────────────────────
      - name: Install Rust toolchain (for cargo-cyclonedx)
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx

      - name: Generate CycloneDX SBOM
        run: |
          cd core
          cargo cyclonedx --manifest-path Cargo.toml --format json --output-cdx
          cp bom.json ../artifacts/omegon-sbom.cdx.json

      # ─── Signing (Sigstore cosign keyless) ─────────────────────
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release artifacts
        run: |
          cd artifacts
          for archive in omegon-*.tar.gz; do
            echo "Signing $archive..."
            cosign sign-blob --yes "$archive" \
              --output-signature "${archive}.sig" \
              --output-certificate "${archive}.pem"
          done

      - name: Sign SBOM
        run: |
          cd artifacts
          cosign sign-blob --yes omegon-sbom.cdx.json \
            --output-signature omegon-sbom.cdx.json.sig \
            --output-certificate omegon-sbom.cdx.json.pem

      # ─── Provenance attestation ────────────────────────────────
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: artifacts/omegon-*.tar.gz

      # ─── GitHub Release ────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc.') }}
          files: |
            artifacts/omegon-*.tar.gz
            artifacts/omegon-*.tar.gz.sha256
            artifacts/omegon-*.tar.gz.sig
            artifacts/omegon-*.tar.gz.pem
            artifacts/checksums.sha256
            artifacts/omegon-sbom.cdx.json
            artifacts/omegon-sbom.cdx.json.sig
            artifacts/omegon-sbom.cdx.json.pem
