name: Release Rust binary

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to release (e.g. v0.15.5). Must already exist on origin.'
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}
  RELEASE_GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
  APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
  APPLE_SIGNING_CERT_B64: ${{ secrets.APPLE_SIGNING_CERT_B64 }}
  APPLE_SIGNING_CERT_PASSWORD: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
  APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8_B64 }}
  APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
  APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            zigbuild: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            zigbuild: true
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild (for Linux compatibility builds)
        if: matrix.zigbuild
        run: cargo install cargo-zigbuild

      - name: Build release binary
        run: |
          if [ "${{ matrix.zigbuild }}" = "true" ]; then
            cd core && cargo zigbuild --release --target ${{ matrix.target }} -p omegon
          else
            cd core && cargo build --release --target ${{ matrix.target }} -p omegon
          fi

      - name: Strip binary
        run: |
          BINARY="core/target/${{ matrix.target }}/release/omegon"
          if command -v llvm-strip >/dev/null 2>&1; then
            llvm-strip "$BINARY"
          elif command -v strip >/dev/null 2>&1; then
            strip "$BINARY" 2>/dev/null || true
          fi

      - name: Import Apple signing certificate
        if: runner.os == 'macOS' && env.APPLE_SIGNING_CERT_B64 != '' && env.APPLE_SIGNING_CERT_PASSWORD != '' && env.APPLE_CODESIGN_IDENTITY != ''
        env:
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/omegon-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/omegon-signing.p12"
          echo "$APPLE_SIGNING_CERT_B64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_SIGNING_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Sign macOS binary
        if: runner.os == 'macOS' && env.APPLE_SIGNING_CERT_B64 != '' && env.APPLE_SIGNING_CERT_PASSWORD != '' && env.APPLE_CODESIGN_IDENTITY != ''
        run: |
          set -euo pipefail
          BINARY="core/target/${{ matrix.target }}/release/omegon"
          codesign --force --options runtime --timestamp --sign "$APPLE_CODESIGN_IDENTITY" "$BINARY"
          codesign --verify --deep --strict --verbose=2 "$BINARY"

      - name: Notarize macOS binary
        if: runner.os == 'macOS' && env.APPLE_SIGNING_CERT_B64 != '' && env.APPLE_SIGNING_CERT_PASSWORD != '' && env.APPLE_CODESIGN_IDENTITY != '' && env.APPLE_API_KEY_P8_B64 != '' && env.APPLE_API_KEY_ID != '' && env.APPLE_API_ISSUER != ''
        run: |
          set -euo pipefail
          BINARY="core/target/${{ matrix.target }}/release/omegon"
          NOTARY_ZIP="$RUNNER_TEMP/omegon-${{ matrix.target }}-notary.zip"
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_API_KEY_P8_B64" | base64 --decode > "$KEY_PATH"
          ditto -c -k --keepParent "$BINARY" "$NOTARY_ZIP"
          xcrun notarytool submit "$NOTARY_ZIP" \
            --key "$KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait

      - name: Create archive
        run: |
          VERSION=${RELEASE_TAG#v}
          ARCHIVE="omegon-${VERSION}-${{ matrix.target }}.${{ matrix.archive }}"
          BINARY="core/target/${{ matrix.target }}/release/omegon"
          tar czf "$ARCHIVE" -C "$(dirname $BINARY)" omegon
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Generate SHA256 checksum
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

  live-upstream-smoke:
    name: Live upstream smoke (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      CARGO_TERM_COLOR: always
      OMEGON_RUN_LIVE_UPSTREAM_TESTS: "1"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
      OLLAMA_HOST: ${{ secrets.OLLAMA_HOST }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Run live upstream smoke suite
        id: live_smoke
        run: |
          set -o pipefail
          cd core
          cargo test -p omegon --test live_upstream_smoke -- --nocapture 2>&1 | tee /tmp/live-upstream-smoke.log

      - name: Upload live upstream smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-upstream-smoke-log
          path: /tmp/live-upstream-smoke.log

      - name: Summarize live upstream smoke outcome
        if: always()
        run: |
          {
            echo "## Live upstream smoke (non-blocking)"
            echo
            echo "Outcome: ${{ steps.live_smoke.outcome }}"
            echo
            echo "This job does not block release publication."
            echo
            echo '```'
            tail -n 80 /tmp/live-upstream-smoke.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  linux-abi-validation:
    name: Linux ABI validation (${{ matrix.name }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-22.04
            image: ubuntu:22.04
            install_cmd: apt-get update && apt-get install -y libc6 libgcc-s1 ca-certificates file
          - name: rockylinux-9
            image: rockylinux:9
            install_cmd: dnf install -y glibc libgcc file ca-certificates
          - name: amazonlinux-2023
            image: amazonlinux:2023
            install_cmd: dnf install -y glibc libgcc file ca-certificates

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-x86_64-unknown-linux-gnu
          path: abi-artifacts

      - name: Unpack Linux x86_64 artifact
        run: |
          set -euo pipefail
          mkdir -p abi-artifacts/unpacked
          tar xzf abi-artifacts/omegon-*.tar.gz -C abi-artifacts/unpacked
          ls -lh abi-artifacts/unpacked/omegon
          file abi-artifacts/unpacked/omegon

      - name: Validate binary in ${{ matrix.name }} container
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD/abi-artifacts/unpacked:/work:ro" \
            "${{ matrix.image }}" \
            /bin/sh -lc '
              set -e
              ${{ matrix.install_cmd }}
              ldd --version || true
              /work/omegon --version
            '

  release:
    name: Create release
    needs: [build, linux-abi-validation]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Aggregate checksums
        run: |
          cd artifacts
          cat *.sha256 > checksums.sha256
          cat checksums.sha256

      - name: Generate release manifest
        run: |
          python3 scripts/release_manifest.py generate \
            --tag "${RELEASE_TAG}" \
            --checksums artifacts/checksums.sha256 \
            --output artifacts/release-manifest.json \
            --repo "${{ github.repository }}" \
            --commit "${{ github.sha }}"
          cat artifacts/release-manifest.json

      - name: Install Rust toolchain (for cargo-cyclonedx)
        if: ${{ !contains(env.RELEASE_TAG, '-nightly.') }}
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-cyclonedx
        if: ${{ !contains(env.RELEASE_TAG, '-nightly.') }}
        run: cargo install cargo-cyclonedx cargo-license

      - name: License audit
        if: ${{ !contains(env.RELEASE_TAG, '-nightly.') }}
        run: |
          cd core
          cargo license --json > /tmp/licenses.json
          python3 ../scripts/license-audit.py --input /tmp/licenses.json --summary

      - name: Generate CycloneDX SBOM
        if: ${{ !contains(env.RELEASE_TAG, '-nightly.') }}
        run: |
          cd core
          cargo cyclonedx --manifest-path Cargo.toml --format json || true
          BOM=$(find . -maxdepth 1 -name '*.cdx.json' -o -name 'bom.json' | head -1)
          if [ -n "$BOM" ]; then
            cp "$BOM" ../artifacts/omegon-sbom.cdx.json
          else
            echo '{"bomFormat":"CycloneDX","specVersion":"1.4","components":[]}' > ../artifacts/omegon-sbom.cdx.json
          fi
          cp ../THIRD_PARTY_NOTICES.md ../artifacts/THIRD_PARTY_NOTICES.md

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release artifacts
        run: |
          cd artifacts
          for archive in omegon-*.tar.gz; do
            echo "Signing $archive..."
            cosign sign-blob --yes "$archive" \
              --output-signature "${archive}.sig" \
              --output-certificate "${archive}.pem"
          done

      - name: Sign SBOM and notices
        if: ${{ !contains(env.RELEASE_TAG, '-nightly.') }}
        run: |
          cd artifacts
          cosign sign-blob --yes omegon-sbom.cdx.json \
            --output-signature omegon-sbom.cdx.json.sig \
            --output-certificate omegon-sbom.cdx.json.pem
          cosign sign-blob --yes THIRD_PARTY_NOTICES.md \
            --output-signature THIRD_PARTY_NOTICES.md.sig \
            --output-certificate THIRD_PARTY_NOTICES.md.pem

      - name: Attest build provenance
        if: ${{ !contains(env.RELEASE_TAG, '-nightly.') }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: artifacts/omegon-*.tar.gz

      - name: Preflight release token
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        run: |
          set -euo pipefail
          gh api repos/${{ github.repository }} >/dev/null
          gh api repos/${{ github.repository }}/releases >/dev/null

      - name: Create nightly GitHub Release
        if: ${{ contains(env.RELEASE_TAG, '-nightly.') }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        run: |
          set -euo pipefail
          gh release create "${{ env.RELEASE_TAG }}" \
            --title "${{ env.RELEASE_TAG }}" \
            --generate-notes \
            --draft \
            --prerelease \
            artifacts/omegon-*.tar.gz \
            artifacts/omegon-*.tar.gz.sha256 \
            artifacts/omegon-*.tar.gz.sig \
            artifacts/omegon-*.tar.gz.pem \
            artifacts/checksums.sha256 \
            artifacts/release-manifest.json

      - name: Create stable/rc GitHub Release
        if: ${{ !contains(env.RELEASE_TAG, '-nightly.') }}
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-rc.') }}
          draft: false
          files: |
            artifacts/omegon-*.tar.gz
            artifacts/omegon-*.tar.gz.sha256
            artifacts/omegon-*.tar.gz.sig
            artifacts/omegon-*.tar.gz.pem
            artifacts/checksums.sha256
            artifacts/release-manifest.json
            artifacts/omegon-sbom.cdx.json
            artifacts/omegon-sbom.cdx.json.sig
            artifacts/omegon-sbom.cdx.json.pem
            artifacts/THIRD_PARTY_NOTICES.md
            artifacts/THIRD_PARTY_NOTICES.md.sig
            artifacts/THIRD_PARTY_NOTICES.md.pem
