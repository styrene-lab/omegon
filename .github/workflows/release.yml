name: Release Rust binary

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to release (e.g. v0.15.5). Must already exist on origin.'
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}
  RELEASE_GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
  APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
  APPLE_SIGNING_CERT_B64: ${{ secrets.APPLE_SIGNING_CERT_B64 }}
  APPLE_SIGNING_CERT_PASSWORD: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
  APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8_B64 }}
  APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
  APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

jobs:
  # Stable tags are not publishable until trunk advertises the same or a newer
  # workspace version. This server-side gate also covers direct tag pushes and
  # manual workflow dispatches that bypass the local `just publish` guard.
  verify-trunk-version:
    name: Verify trunk release version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name || github.ref }}
          fetch-depth: 0

      - name: Require stable release version on main
        if: ${{ !contains(env.RELEASE_TAG, '-nightly.') }}
        run: |
          set -euo pipefail
          git fetch origin main
          python3 scripts/release_branch.py verify-publish

  # ── Primary builds (macOS + Linux x86_64) ──────────────────────
  # These finish in ~10 minutes and unblock the release.
  build:
    name: Build ${{ matrix.target }}
    needs: verify-trunk-version
    if: ${{ !contains(inputs.tag_name || github.ref_name, '-rc.') }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            zigbuild: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            zigbuild: true
            static: true
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (for static Linux builds)
        if: matrix.static
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Zig (required by cargo-zigbuild)
        if: matrix.zigbuild
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild (for Linux compatibility builds)
        if: matrix.zigbuild
        run: cargo install cargo-zigbuild

      - name: Build release binary
        env:
          # Static linking for musl targets — produces a fully static binary
          RUSTFLAGS: ${{ matrix.static && '-C target-feature=+crt-static' || '' }}
        run: |
          if [ "${{ matrix.zigbuild }}" = "true" ]; then
            cargo zigbuild --release --target ${{ matrix.target }} -p omegon
          else
            cargo build --release --target ${{ matrix.target }} -p omegon
          fi

      - name: Build omegon-browser extension
        env:
          RUSTFLAGS: ${{ matrix.static && '-C target-feature=+crt-static' || '' }}
        run: |
          if [ "${{ matrix.zigbuild }}" = "true" ]; then
            cargo zigbuild --manifest-path extensions/omegon-browser/Cargo.toml --release --target ${{ matrix.target }}
          else
            cargo build --manifest-path extensions/omegon-browser/Cargo.toml --release --target ${{ matrix.target }}
          fi

      - name: Strip binary
        run: |
          BINARY="target/${{ matrix.target }}/release/omegon"
          if command -v llvm-strip >/dev/null 2>&1; then
            llvm-strip "$BINARY"
          elif command -v strip >/dev/null 2>&1; then
            strip "$BINARY" 2>/dev/null || true
          fi
          EXT_BINARY="extensions/omegon-browser/target/${{ matrix.target }}/release/omegon-browser"
          if [ -f "$EXT_BINARY" ]; then
            if command -v llvm-strip >/dev/null 2>&1; then
              llvm-strip "$EXT_BINARY"
            elif command -v strip >/dev/null 2>&1; then
              strip "$EXT_BINARY" 2>/dev/null || true
            fi
          fi

      - name: Import Apple signing certificate
        if: runner.os == 'macOS' && env.APPLE_SIGNING_CERT_B64 != '' && env.APPLE_CODESIGN_IDENTITY != ''
        env:
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/omegon-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/omegon-signing.p12"
          echo "$APPLE_SIGNING_CERT_B64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "${APPLE_SIGNING_CERT_PASSWORD:-}" -T /usr/bin/codesign -T /usr/bin/security -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Sign macOS binary
        if: runner.os == 'macOS' && env.APPLE_SIGNING_CERT_B64 != '' && env.APPLE_CODESIGN_IDENTITY != ''
        run: |
          set -euo pipefail
          BINARY="target/${{ matrix.target }}/release/omegon"
          codesign --force --options runtime --timestamp --sign "$APPLE_CODESIGN_IDENTITY" "$BINARY"
          codesign --verify --deep --strict --verbose=2 "$BINARY"

      - name: Notarize macOS binary
        if: runner.os == 'macOS' && env.APPLE_SIGNING_CERT_B64 != '' && env.APPLE_CODESIGN_IDENTITY != '' && env.APPLE_API_KEY_P8_B64 != '' && env.APPLE_API_KEY_ID != '' && env.APPLE_API_ISSUER != ''
        run: |
          set -euo pipefail
          BINARY="target/${{ matrix.target }}/release/omegon"
          NOTARY_ZIP="$RUNNER_TEMP/omegon-${{ matrix.target }}-notary.zip"
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_API_KEY_P8_B64" | base64 --decode > "$KEY_PATH"
          ditto -c -k --keepParent "$BINARY" "$NOTARY_ZIP"
          # Retry notarization up to 3 times — Apple's service frequently times out
          for attempt in 1 2 3; do
            echo "Notarization attempt $attempt/3..."
            if xcrun notarytool submit "$NOTARY_ZIP" \
              --key "$KEY_PATH" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" \
              --timeout 10m \
              --wait; then
              echo "Notarization succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::warning::Notarization failed after 3 attempts — binary is signed but not notarized"
              # Don't fail the build — signed but un-notarized binaries still work,
              # users just see a Gatekeeper warning on first launch.
              exit 0
            fi
            echo "Attempt $attempt failed, retrying in 30s..."
            sleep 30
          done

      - name: Create archive
        run: |
          VERSION=${RELEASE_TAG#v}
          ARCHIVE="omegon-${VERSION}-${{ matrix.target }}.${{ matrix.archive }}"
          BINARY="target/${{ matrix.target }}/release/omegon"
          tar czf "$ARCHIVE" -C "$(dirname $BINARY)" omegon
          EXT_ARCHIVE="omegon-browser-${VERSION}-${{ matrix.target }}.${{ matrix.archive }}"
          EXT_BINARY="extensions/omegon-browser/target/${{ matrix.target }}/release/omegon-browser"
          EXT_PACKAGE="$RUNNER_TEMP/omegon-browser-package"
          rm -rf "$EXT_PACKAGE"
          mkdir -p "$EXT_PACKAGE/target/release"
          cp extensions/omegon-browser/manifest.toml "$EXT_PACKAGE/manifest.toml"
          cp "$EXT_BINARY" "$EXT_PACKAGE/target/release/omegon-browser"
          tar czf "$EXT_ARCHIVE" -C "$EXT_PACKAGE" manifest.toml target
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV
          echo "EXT_ARCHIVE=$EXT_ARCHIVE" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Generate SHA256 checksum
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
            sha256sum "$EXT_ARCHIVE" > "$EXT_ARCHIVE.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
            shasum -a 256 "$EXT_ARCHIVE" > "$EXT_ARCHIVE.sha256"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: build-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
            ${{ env.EXT_ARCHIVE }}
            ${{ env.EXT_ARCHIVE }}.sha256

  # ── Extended build (Linux ARM — slow cross-compile) ────────────
  # Runs in parallel but does not block release publication.
  build-extended:
    name: Build aarch64-unknown-linux-gnu
    if: ${{ !contains(inputs.tag_name || github.ref_name, '-rc.') }}
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install Zig (required by cargo-zigbuild)
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild

      - name: Build release binary
        run: cargo zigbuild --release --target aarch64-unknown-linux-gnu -p omegon

      - name: Build omegon-browser extension
        run: cargo zigbuild --manifest-path extensions/omegon-browser/Cargo.toml --release --target aarch64-unknown-linux-gnu

      - name: Strip binary
        run: |
          BINARY="target/aarch64-unknown-linux-gnu/release/omegon"
          if command -v llvm-strip >/dev/null 2>&1; then
            llvm-strip "$BINARY"
          elif command -v strip >/dev/null 2>&1; then
            strip "$BINARY" 2>/dev/null || true
          fi
          EXT_BINARY="extensions/omegon-browser/target/aarch64-unknown-linux-gnu/release/omegon-browser"
          if command -v llvm-strip >/dev/null 2>&1; then
            llvm-strip "$EXT_BINARY"
          elif command -v strip >/dev/null 2>&1; then
            strip "$EXT_BINARY" 2>/dev/null || true
          fi

      - name: Create archive
        run: |
          VERSION=${RELEASE_TAG#v}
          ARCHIVE="omegon-${VERSION}-aarch64-unknown-linux-gnu.tar.gz"
          BINARY="target/aarch64-unknown-linux-gnu/release/omegon"
          tar czf "$ARCHIVE" -C "$(dirname $BINARY)" omegon
          EXT_ARCHIVE="omegon-browser-${VERSION}-aarch64-unknown-linux-gnu.tar.gz"
          EXT_BINARY="extensions/omegon-browser/target/aarch64-unknown-linux-gnu/release/omegon-browser"
          EXT_PACKAGE="$RUNNER_TEMP/omegon-browser-package"
          rm -rf "$EXT_PACKAGE"
          mkdir -p "$EXT_PACKAGE/target/release"
          cp extensions/omegon-browser/manifest.toml "$EXT_PACKAGE/manifest.toml"
          cp "$EXT_BINARY" "$EXT_PACKAGE/target/release/omegon-browser"
          tar czf "$EXT_ARCHIVE" -C "$EXT_PACKAGE" manifest.toml target
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV
          echo "EXT_ARCHIVE=$EXT_ARCHIVE" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Generate SHA256 checksum
        run: |
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          sha256sum "$EXT_ARCHIVE" > "$EXT_ARCHIVE.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: build-aarch64-unknown-linux-gnu
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
            ${{ env.EXT_ARCHIVE }}
            ${{ env.EXT_ARCHIVE }}.sha256

  live-upstream-smoke:
    name: Live upstream smoke (non-blocking)
    if: ${{ !contains(inputs.tag_name || github.ref_name, '-rc.') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    env:
      CARGO_TERM_COLOR: always
      OMEGON_RUN_LIVE_UPSTREAM_TESTS: "1"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
      OLLAMA_HOST: ${{ secrets.OLLAMA_HOST }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Run live upstream smoke suite
        id: live_smoke
        run: |
          set -o pipefail
          # (workspace at root)
          cargo test -p omegon --test live_upstream_smoke -- --nocapture 2>&1 | tee /tmp/live-upstream-smoke.log

      - name: Upload live upstream smoke log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: live-upstream-smoke-log
          path: /tmp/live-upstream-smoke.log

      - name: Summarize live upstream smoke outcome
        if: always()
        run: |
          {
            echo "## Live upstream smoke (non-blocking)"
            echo
            echo "Outcome: ${{ steps.live_smoke.outcome }}"
            echo
            echo "This job does not block release publication."
            echo
            echo '```'
            tail -n 80 /tmp/live-upstream-smoke.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  linux-abi-validation:
    name: Linux ABI validation (${{ matrix.name }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-22.04
            image: ubuntu:22.04
            install_cmd: apt-get update && apt-get install -y libc6 libgcc-s1 ca-certificates file
          - name: rockylinux-9
            image: rockylinux:9
            install_cmd: dnf install -y glibc libgcc file ca-certificates
          - name: amazonlinux-2023
            image: amazonlinux:2023
            install_cmd: dnf install -y glibc libgcc file ca-certificates

    steps:
      - uses: actions/download-artifact@v6
        with:
          name: build-x86_64-unknown-linux-gnu
          path: abi-artifacts

      - name: Unpack Linux x86_64 artifact
        run: |
          set -euo pipefail
          mkdir -p abi-artifacts/unpacked
          tar xzf "$(ls abi-artifacts/omegon-[0-9]*.tar.gz | head -1)" -C abi-artifacts/unpacked
          ls -lh abi-artifacts/unpacked/omegon
          file abi-artifacts/unpacked/omegon

      - name: Validate binary in ${{ matrix.name }} container
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD/abi-artifacts/unpacked:/work:ro" \
            "${{ matrix.image }}" \
            /bin/sh -lc '
              set -e
              ${{ matrix.install_cmd }}
              ldd --version || true
              /work/omegon --version
            '

  # ── Release (publishes as soon as primary builds pass) ─────────
  release:
    name: Create release
    needs: [build, build-extended, linux-abi-validation]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v6

      - name: Download primary build artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts
          pattern: build-*
          merge-multiple: true

      - name: Aggregate checksums
        run: |
          cd artifacts
          cat *.sha256 > checksums.sha256
          cat checksums.sha256

      - name: Generate release manifest
        run: |
          python3 scripts/release_manifest.py generate \
            --tag "${RELEASE_TAG}" \
            --checksums artifacts/checksums.sha256 \
            --output artifacts/release-manifest.json \
            --repo "${{ github.repository }}" \
            --commit "${{ github.sha }}"
          cat artifacts/release-manifest.json

      - name: Install Rust toolchain (for cargo-cyclonedx)
        if: ${{ !contains(env.RELEASE_TAG, '-nightly.') }}
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-cyclonedx
        if: ${{ !contains(env.RELEASE_TAG, '-nightly.') }}
        run: cargo install cargo-cyclonedx cargo-license

      - name: License audit
        if: ${{ !contains(env.RELEASE_TAG, '-nightly.') }}
        run: |
          # (workspace at root)
          cargo license --json > /tmp/licenses.json
          python3 scripts/license-audit.py --input /tmp/licenses.json --summary

      - name: Generate CycloneDX SBOM
        if: ${{ !contains(env.RELEASE_TAG, '-nightly.') }}
        run: |
          # (workspace at root)
          cargo cyclonedx --manifest-path Cargo.toml --format json || true
          BOM=$(find . -maxdepth 1 -name '*.cdx.json' -o -name 'bom.json' | head -1)
          if [ -n "$BOM" ]; then
            cp "$BOM" artifacts/omegon-sbom.cdx.json
          else
            echo '{"bomFormat":"CycloneDX","specVersion":"1.4","components":[]}' > artifacts/omegon-sbom.cdx.json
          fi
          cp THIRD_PARTY_NOTICES.md artifacts/THIRD_PARTY_NOTICES.md

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release artifacts
        run: |
          cd artifacts
          for archive in *.tar.gz; do
            echo "Signing $archive..."
            cosign sign-blob --yes "$archive" \
              --output-signature "${archive}.sig" \
              --output-certificate "${archive}.pem"
          done

      - name: Sign SBOM and notices
        if: ${{ !contains(env.RELEASE_TAG, '-nightly.') }}
        run: |
          cd artifacts
          cosign sign-blob --yes omegon-sbom.cdx.json \
            --output-signature omegon-sbom.cdx.json.sig \
            --output-certificate omegon-sbom.cdx.json.pem
          cosign sign-blob --yes THIRD_PARTY_NOTICES.md \
            --output-signature THIRD_PARTY_NOTICES.md.sig \
            --output-certificate THIRD_PARTY_NOTICES.md.pem

      - name: Preflight release token
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        run: |
          set -euo pipefail
          gh api repos/${{ github.repository }} >/dev/null
          gh api repos/${{ github.repository }}/releases >/dev/null

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        run: |
          set -euo pipefail

          # Determine release flags
          IS_NIGHTLY=false
          PRERELEASE_FLAG=""
          DRAFT_FLAG=""
          if echo "${{ env.RELEASE_TAG }}" | grep -q "\-nightly\."; then
            IS_NIGHTLY=true
            PRERELEASE_FLAG="--prerelease"
            DRAFT_FLAG="--draft"
          fi

          # Collect asset files
          ASSET_FILES=(artifacts/omegon-[0-9]*.tar.gz artifacts/omegon-[0-9]*.tar.gz.sha256)
          ASSET_FILES+=(artifacts/omegon-[0-9]*.tar.gz.sig artifacts/omegon-[0-9]*.tar.gz.pem)
          ASSET_FILES+=(artifacts/omegon-browser-*.tar.gz artifacts/omegon-browser-*.tar.gz.sha256)
          ASSET_FILES+=(artifacts/omegon-browser-*.tar.gz.sig artifacts/omegon-browser-*.tar.gz.pem)
          ASSET_FILES+=(artifacts/checksums.sha256 artifacts/release-manifest.json)
          if [ "$IS_NIGHTLY" = "false" ]; then
            ASSET_FILES+=(artifacts/omegon-sbom.cdx.json artifacts/omegon-sbom.cdx.json.sig)
            ASSET_FILES+=(artifacts/omegon-sbom.cdx.json.pem)
            ASSET_FILES+=(artifacts/THIRD_PARTY_NOTICES.md artifacts/THIRD_PARTY_NOTICES.md.sig)
            ASSET_FILES+=(artifacts/THIRD_PARTY_NOTICES.md.pem)
          fi

          # If a release already exists (e.g. created manually), delete it
          # and recreate with artifacts. This avoids the "tag already used
          # by immutable release" error from GitHub Attestations.
          if gh release view "${{ env.RELEASE_TAG }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${{ env.RELEASE_TAG }} already exists — deleting to recreate with artifacts"
            gh release delete "${{ env.RELEASE_TAG }}" --repo "${{ github.repository }}" --yes || true
            # Brief pause to let GitHub propagate the deletion
            sleep 3
          fi

          gh release create "${{ env.RELEASE_TAG }}" \
            --repo "${{ github.repository }}" \
            --title "${{ env.RELEASE_TAG }}" \
            --generate-notes \
            $PRERELEASE_FLAG $DRAFT_FLAG \
            "${ASSET_FILES[@]}"

      - name: Attest build provenance
        if: ${{ !contains(env.RELEASE_TAG, '-nightly.') }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: artifacts/omegon-*.tar.gz

      - name: Trigger Homebrew formula update
        if: ${{ !contains(env.RELEASE_TAG, '-nightly.') }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        run: |
          gh workflow run homebrew.yml \
            --repo "${{ github.repository }}" \
            -f tag_name="${{ env.RELEASE_TAG }}"

  oci-images:
    name: OCI images (${{ matrix.image }})
    needs: release
    # Only build OCI images for stable releases — nightlies don't
    # need container images, and 7 Nix builds burn ~70 runner-minutes.
    if: ${{ !contains(inputs.tag_name || github.ref_name, '-nightly.') }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: oci-chat
            description: "Conversational agent"
          - image: oci-coding
            description: "Software engineering agent"
          - image: oci-coding-python
            description: "Python project agent"
          - image: oci-coding-node
            description: "Node.js project agent"
          - image: oci-coding-rust
            description: "Rust project agent"
          - image: oci-infra
            description: "Infrastructure agent"
          - image: oci-full
            description: "Full-stack agent"

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Configure Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Authenticate to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | skopeo login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push ${{ matrix.image }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          echo "Building and pushing ${{ matrix.image }}:${VERSION}..."
          nix run .#${{ matrix.image }}.copyToRegistry --accept-flake-config
          echo "Pushed ${{ matrix.image }}:${VERSION} to ghcr.io"

      - name: Tag as latest (stable only)
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          IMAGE_NAME=$(nix eval --raw .#${{ matrix.image }}.imageName --accept-flake-config 2>/dev/null || echo "")
          if [ -z "$IMAGE_NAME" ]; then
            echo "Could not resolve image name, skipping latest tag"
            exit 0
          fi
          # Retry with backoff — registry may need time to propagate the
          # manifest after the push step completes.
          for attempt in 1 2 3; do
            if skopeo copy \
              "docker://${IMAGE_NAME}:${VERSION}" \
              "docker://${IMAGE_NAME}:latest" 2>/dev/null; then
              echo "Tagged ${IMAGE_NAME}:latest"
              exit 0
            fi
            echo "Attempt $attempt failed — waiting 10s for registry propagation..."
            sleep 10
          done
          echo "Warning: could not tag ${IMAGE_NAME}:latest after 3 attempts"
          echo "The versioned tag :${VERSION} is available — :latest will update on next release"
          # Don't fail the job over a missing :latest tag
          exit 0
