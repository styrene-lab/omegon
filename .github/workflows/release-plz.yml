name: release-plz

# The public extension SDK was extracted to the standalone
# styrene-lab/omegon-extension-rs repository. The host workspace now contains
# only private/internal crates and binary support crates, so release-plz has no
# public packages to publish here.
#
# Keep this workflow manual-only as a placeholder for future public workspace
# crates. It intentionally does not run on pushes to main.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-plz-disabled:
    name: Release disabled
    runs-on: ubuntu-latest
    steps:
      - name: Explain disabled release-plz
        run: |
          echo "release-plz is disabled for the Omegon host workspace."
          echo "The public omegon-extension SDK is released from styrene-lab/omegon-extension-rs."
          echo "Host binary releases are handled by the Release Rust binary workflow."
