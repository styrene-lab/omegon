name: Update Homebrew formula

on:
  release:
    types: [published]

jobs:
  update-stable-formula:
    # Only update on stable releases (no -rc. or -nightly.)
    if: "!contains(github.ref_name, '-rc.') && !contains(github.ref_name, '-nightly.')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout omegon (for release_manifest.py)
        uses: actions/checkout@v4
        with:
          path: omegon

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: styrene-lab/homebrew-tap
          token: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Get release info
        id: release
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT

      - name: Download release manifest
        run: |
          curl -fsSL "https://github.com/styrene-lab/omegon/releases/download/${{ steps.release.outputs.tag }}/release-manifest.json" \
            -o release-manifest.json
          cat release-manifest.json

      - name: Update stable formula
        run: |
          python3 omegon/scripts/release_manifest.py update-homebrew \
            --manifest release-manifest.json \
            --formula homebrew-tap/Formula/omegon.rb
          echo "--- updated formula ---"
          cat homebrew-tap/Formula/omegon.rb

      - name: Validate formula syntax
        run: brew style homebrew-tap/Formula/omegon.rb 2>/dev/null || ruby -c homebrew-tap/Formula/omegon.rb

      - name: Commit and push to tap
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/omegon.rb
          git diff --cached --quiet && echo "formula unchanged" && exit 0
          git commit -m "chore(brew): update omegon to ${{ steps.release.outputs.version }}"
          git push origin main

  update-rc-formula:
    # Only update on RC releases
    if: "contains(github.ref_name, '-rc.')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout omegon (for release_manifest.py)
        uses: actions/checkout@v4
        with:
          path: omegon

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: styrene-lab/homebrew-tap
          token: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Get release info
        id: release
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT

      - name: Download release manifest
        run: |
          curl -fsSL "https://github.com/styrene-lab/omegon/releases/download/${{ steps.release.outputs.tag }}/release-manifest.json" \
            -o release-manifest.json
          cat release-manifest.json

      - name: Update RC formula
        run: |
          python3 omegon/scripts/release_manifest.py update-homebrew \
            --manifest release-manifest.json \
            --formula homebrew-tap/Formula/omegon-rc.rb
          echo "--- updated formula ---"
          cat homebrew-tap/Formula/omegon-rc.rb

      - name: Validate formula syntax
        run: brew style homebrew-tap/Formula/omegon-rc.rb 2>/dev/null || ruby -c homebrew-tap/Formula/omegon-rc.rb

      - name: Commit and push to tap
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/omegon-rc.rb
          git diff --cached --quiet && echo "formula unchanged" && exit 0
          git commit -m "chore(brew): update omegon-rc to ${{ steps.release.outputs.version }}"
          git push origin main
