name: Build & Push omegon-site

on:
  push:
    branches: [main]
    paths:
      - 'core/site/**'
      - 'core/install.sh'
      - 'CHANGELOG.md'
      - 'site/**'
      - 'docs/**'
      - 'openspec/baseline/**'
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      # Build Astro docs site
      - name: Install site dependencies
        run: cd site && npm ci

      - name: Build design tree SVG
        run: cd site && node scripts/build-design-tree.mjs

      - name: Build Astro site
        run: cd site && npx astro build

      # Assemble container build context
      - name: Prepare container build context
        run: |
          cp core/install.sh core/site/install.sh
          cp -r site/dist core/site/docs-dist

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: core/site
          file: core/site/Containerfile
          push: true
          no-cache: true
          tags: |
            ghcr.io/styrene-lab/omegon-site:sha-${{ github.sha }}
            ghcr.io/styrene-lab/omegon-site:latest

      - name: Summary
        run: |
          echo "### Site Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`ghcr.io/styrene-lab/omegon-site:sha-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Pages:** $(find site/dist -name '*.html' | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- **Design tree nodes:** $(grep -c '<circle' site/public/design-tree.svg)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ArgoCD Image Updater will auto-deploy to omegon.styrene.dev." >> $GITHUB_STEP_SUMMARY
