name: Build & Push omegon-site

on:
  push:
    branches:
      - main
      - 'release/**'
    paths:
      - 'core/site/**'
      - 'core/install.sh'
      - 'CHANGELOG.md'
      - 'site/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'docs/**'
      - 'openspec/baseline/**'
  release:
    types: [published]

jobs:
  pages:
    name: Build & deploy Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        run: cd site && npm ci

      - name: Build site
        run: |
          cp core/install.sh site/public/install.sh
          cd site && npm run build

      - name: Deploy Pages
        if: github.ref == 'refs/heads/main' || github.event_name == 'release'
        run: npx wrangler@3 pages deploy site/dist --project-name omegon-styrene-io --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Add custom domain
        if: github.ref == 'refs/heads/main'
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/omegon-styrene-io/domains" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"omegon.styrene.io"}' | python3 -c "
          import json,sys
          r=json.load(sys.stdin)
          errs=[e for e in r.get('errors',[]) if e.get('code') not in (8000018,8000019)]
          sys.exit(1 if errs else 0)
          "
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Summary
        run: |
          echo "### Pages Deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Site:** omegon.styrene.io" >> $GITHUB_STEP_SUMMARY
          echo "- **Pages:** $(find site/dist -name '*.html' | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

  container:
    name: Build & push site container
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        run: cd site && npm ci

      - name: Build site for container bundle
        run: |
          cp core/install.sh site/public/install.sh
          cd site && npm run build

      - name: Prepare container build context
        run: |
          cp core/install.sh core/site/install.sh
          rm -rf core/site/docs-dist
          cp -r site/dist core/site/docs-dist

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: core/site
          file: core/site/Containerfile
          push: ${{ github.ref == 'refs/heads/main' || github.event_name == 'release' }}
          no-cache: true
          tags: |
            ghcr.io/styrene-lab/omegon-site:sha-${{ github.sha }}
            ghcr.io/styrene-lab/omegon-site:latest

      - name: Update vanderlyn kustomization (direct git push)
        if: github.ref == 'refs/heads/main' || github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          NEW_TAG: sha-${{ github.sha }}
        run: |
          git clone --depth=1 https://x-access-token:${GH_TOKEN}@github.com/cwilson613/vanderlyn.git /tmp/vanderlyn
          cd /tmp/vanderlyn
          git config user.name "omegon[bot]"
          git config user.email "noreply@styrene.dev"

          sed -i "s|newTag: sha-.*|newTag: ${NEW_TAG}|" apps/omegon-site/kustomization.yaml

          if git diff --exit-code --quiet; then
            echo "No changes needed"
          else
            git add apps/omegon-site/kustomization.yaml
            git commit -m "chore(omegon-site): deploy ${NEW_TAG}"
            git push origin main
          fi

      - name: Summary
        run: |
          echo "### Site Container" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`ghcr.io/styrene-lab/omegon-site:sha-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Pages bundled:** $(find site/dist -name '*.html' | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- **Design tree nodes:** $(grep -c '<circle' site/public/design-tree.svg)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
