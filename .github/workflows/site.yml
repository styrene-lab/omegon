name: Build & Push omegon-site

on:
  push:
    branches: [main]
    paths:
      - 'core/site/**'
      - 'core/install.sh'
      - 'CHANGELOG.md'
      - 'site/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'docs/**'
      - 'openspec/baseline/**'
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      # Build Astro docs site
      - name: Install site dependencies
        run: cd site && npm ci

      - name: Build design tree SVG
        run: cd site && node scripts/build-design-tree.mjs

      - name: Build Astro site
        run: cd site && npx astro build

      # Assemble container build context

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler
          wrangler pages project create omegon-styrene-io --production-branch main 2>&1 || true
          wrangler pages deploy site/dist --project-name omegon-styrene-io --commit-dirty=true

      - name: Prepare container build context
        run: |
          cp core/install.sh core/site/install.sh
          cp -r site/dist core/site/docs-dist

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: core/site
          file: core/site/Containerfile
          push: true
          no-cache: true
          tags: |
            ghcr.io/styrene-lab/omegon-site:sha-${{ github.sha }}
            ghcr.io/styrene-lab/omegon-site:latest

      - name: Update vanderlyn kustomization (direct git push)
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          NEW_TAG: sha-${{ github.sha }}
        run: |
          # Clone the config repo
          git clone --depth=1 https://x-access-token:${GH_TOKEN}@github.com/cwilson613/vanderlyn.git /tmp/vanderlyn
          cd /tmp/vanderlyn
          git config user.name "omegon[bot]"
          git config user.email "noreply@styrene.dev"
          
          # Update kustomization.yaml with the new image tag
          sed -i "s|newTag: sha-.*|newTag: ${NEW_TAG}|" apps/omegon-site/kustomization.yaml
          
          # Commit and push (only if changed)
          if git diff --exit-code --quiet; then
            echo "No changes needed"
          else
            git add apps/omegon-site/kustomization.yaml
            git commit -m "chore(omegon-site): deploy ${NEW_TAG}"
            git push origin main
          fi

      - name: Summary
        run: |
          echo "### Site Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`ghcr.io/styrene-lab/omegon-site:sha-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Pages:** $(find site/dist -name '*.html' | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- **Design tree nodes:** $(grep -c '<circle' site/public/design-tree.svg)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Kustomization updated. ArgoCD auto-sync deploys immediately." >> $GITHUB_STEP_SUMMARY
