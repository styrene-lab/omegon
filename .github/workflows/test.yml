name: Tests

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches: [main]

jobs:
  rust-build:
    name: Rust build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build omegon binary
        run: cargo build -p omegon

  rust-unit:
    name: Rust unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run omegon tests
        env:
          OMEGON_NERD_FONT: "1"
        run: cargo test -p omegon --bin omegon -- --nocapture

  rust-integration:
    name: Rust integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run omegon integration tests
        env:
          OMEGON_NERD_FONT: "1"
        run: cargo test -p omegon --tests -- --nocapture

  rust-standalone-crates:
    name: Standalone crate tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Standalone crate compilation (no workspace deps)
        run: |
          cargo build -p omegon-memory --no-default-features
          cargo build -p omegon-secrets --no-default-features
          cargo test -p omegon-memory --no-default-features
          cargo test -p omegon-secrets --no-default-features

  extension-install-integration:
    name: Extension install integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Extension install integration tests
        run: cargo test -p omegon --test extension_install_blackbox -- --test-threads=1 --nocapture

  daemon-smoke:
    name: Smoke reference daemon launcher
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build omegon binary
        run: cargo build -p omegon
      - name: Smoke reference daemon launcher
        run: |
          python3 scripts/launch_omegon_daemon.py \
            --binary target/debug/omegon \
            --cwd "$PWD" \
            --model anthropic:claude-sonnet-4-6 \
            --control-port 7856 \
            --strict-port

  benchmark-validation:
    name: Benchmark validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Validate benchmark task definitions
        run: python3 scripts/validate_benchmarks.py
      - name: Validate benchmark harness loads
        run: |
          python3 -c "
          import importlib.util, sys
          spec = importlib.util.spec_from_file_location('h', 'scripts/benchmark_harness.py')
          m = importlib.util.module_from_spec(spec)
          sys.modules['h'] = m
          spec.loader.exec_module(m)
          print('benchmark_harness.py: ok')
          "

  lipstyk:
    name: lipstyk
    uses: styrene-lab/lipstyk/.github/workflows/lipstyk.yml@main
    with:
      paths: "core/crates/"
      # The reusable workflow runs the full scan threshold before the PR diff
      # gate. Keep the full scan report/SARIF useful without blocking every PR
      # on existing repository-wide baseline debt; the diff threshold remains
      # the merge gate for newly introduced findings.
      threshold: 999999
      diff-threshold: 15
