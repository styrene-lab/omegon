name: Provider API Drift Check

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  CARGO_TERM_COLOR: always
  OMEGON_RUN_LIVE_UPSTREAM_TESTS: '1'
  OLLAMA_HOST: ${{ secrets.OLLAMA_HOST }}

jobs:
  check-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve drift credentials
        run: |
          {
            echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_DRIFT_API_KEY != '' && secrets.ANTHROPIC_DRIFT_API_KEY || secrets.ANTHROPIC_API_KEY }}"
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_DRIFT_API_KEY != '' && secrets.OPENAI_DRIFT_API_KEY || secrets.OPENAI_API_KEY }}"
            echo "OLLAMA_API_KEY=${{ secrets.OLLAMA_DRIFT_API_KEY != '' && secrets.OLLAMA_DRIFT_API_KEY || secrets.OLLAMA_API_KEY }}"
            echo "OMEGON_RUN_OLLAMA_LOCAL_LIVE_TEST=0"
          } >> "$GITHUB_ENV"

      - name: Run live upstream drift suite
        id: drift
        continue-on-error: true
        run: |
          set -o pipefail
          mkdir -p .tmp/provider-drift
          # (workspace at root)
          cargo test -p omegon --test live_upstream_smoke -- --nocapture 2>&1 | tee .tmp/provider-drift/live-upstream-smoke.log

      - name: Summarize provider drift results
        id: summary
        if: always()
        run: |
          python3 scripts/provider_drift_issue.py \
            --log .tmp/provider-drift/live-upstream-smoke.log \
            --repo '${{ github.repository }}' \
            --run-id '${{ github.run_id }}' \
            --sha '${{ github.sha }}' \
            --event-name '${{ github.event_name }}' \
            --output .tmp/provider-drift/report.json
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          report = json.loads(Path('.tmp/provider-drift/report.json').read_text())
          summary_path = Path('.tmp/provider-drift/step-summary.md')
          summary_path.write_text(report['summary'])
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f"drift_detected={'true' if report['drift_detected'] else 'false'}\n")
              fh.write(f"fingerprint={report['fingerprint']}\n")
          PY
        shell: bash

      - name: Append job summary
        if: always()
        run: cat .tmp/provider-drift/step-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload provider drift report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: provider-drift-report
          path: |
            .tmp/provider-drift/live-upstream-smoke.log
            .tmp/provider-drift/report.json
            .tmp/provider-drift/step-summary.md

      - name: Open or update drift issue
        if: always() && steps.summary.outputs.drift_detected == 'true'
        uses: actions/github-script@v7
        env:
          REPORT_PATH: .tmp/provider-drift/report.json
        with:
          script: |
            const fs = require('node:fs');
            const report = JSON.parse(fs.readFileSync(process.env.REPORT_PATH, 'utf8'));
            const marker = `provider-drift-fingerprint: ${report.fingerprint}`;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'provider-drift',
              per_page: 100,
            });

            const exact = issues.find((issue) => issue.body && issue.body.includes(marker));
            if (exact) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: exact.number,
                body: report.summary,
              });
              core.notice(`Updated existing provider drift issue #${exact.number}`);
              return;
            }

            for (const issue of issues) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: `Superseded by drift fingerprint \\`${report.fingerprint}\\`. Closing in favor of a fresh issue for the new failure shape.`,
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }

            const created = await github.rest.issues.create({
              owner,
              repo,
              title: report.title,
              body: report.body,
              labels: ['provider-drift', 'automated'],
            });
            core.notice(`Created provider drift issue #${created.data.number}`);
